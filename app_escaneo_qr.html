<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escaneo QR — Formación de Padres</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a3a5c;
      color: white;
      text-align: center;
      padding: 16px;
    }

    header h1 { font-size: 18px; }
    header p  { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    #scanner-container {
      width: 100%;
      max-width: 400px;
      margin: 24px auto 0;
      padding: 0 16px;
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #1a3a5c;
    }

    #resultado {
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .tarjeta {
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tarjeta.ok {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      display: block;
    }

    .tarjeta.ya {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      display: block;
    }

    .tarjeta.error {
      background: #fff3e0;
      border: 2px solid #ff9800;
      display: block;
    }

    .icono {
      font-size: 64px;
      margin-bottom: 12px;
    }

    .nombre-familia {
      font-size: 24px;
      font-weight: bold;
      color: #1a3a5c;
      margin-bottom: 6px;
    }

    .colegio {
      font-size: 15px;
      color: #555;
      margin-bottom: 16px;
    }

    .estado {
      font-size: 13px;
      color: #888;
    }

    #btn-escanear {
      display: block;
      width: calc(100% - 32px);
      max-width: 368px;
      margin: 0 auto 24px;
      padding: 14px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #btn-escanear:active {
      background: #14304e;
    }

    #cargando {
      display: none;
      text-align: center;
      color: #888;
      font-size: 14px;
      margin: 12px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Formación de Padres</h1>
  <p>Campogrande · Thezia</p>
</header>

<div id="scanner-container">
  <div id="reader"></div>
</div>

<p id="cargando">Verificando...</p>

<div id="resultado">
  <div class="tarjeta" id="tarjeta-ok">
    <div class="icono">✅</div>
    <div class="nombre-familia" id="nombre-ok"></div>
    <div class="colegio" id="colegio-ok"></div>
    <div class="estado">Asistencia registrada</div>
  </div>

  <div class="tarjeta" id="tarjeta-ya">
    <div class="icono">✅</div>
    <div class="nombre-familia" id="nombre-ya"></div>
    <div class="colegio" id="colegio-ya"></div>
    <div class="estado">Ya registrada anteriormente</div>
  </div>

  <div class="tarjeta" id="tarjeta-error">
    <div class="icono">⚠️</div>
    <div class="nombre-familia">QR no reconocido</div>
    <div class="estado">Este pase no está en la lista de inscritos</div>
  </div>
</div>

<button id="btn-escanear" onclick="reiniciar()">Escanear otro QR</button>

<script>
  const WEBAPP_URL = "https://script.google.com/a/macros/campogrande.edu.mx/s/AKfycbyiiKkwBLRTTkB8WBRn50C5_gQYHfIxF6nVvjRnZBv79oL6o1Bq0d0j8WajZKGZnpJS1A/exec";

  let scanner = null;
  let procesando = false;

  function iniciarScanner() {
    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanExitoso,
      () => {}
    ).catch(err => {
      document.getElementById("reader").innerHTML =
        "<p style='padding:24px;color:#888;text-align:center'>No se pudo acceder a la cámara.<br>Verifica los permisos.</p>";
    });
  }

  async function onScanExitoso(id_familia) {
    if (procesando) return;
    procesando = true;

    // Pausar scanner
    if (scanner) await scanner.pause();

    // Ocultar tarjetas previas
    ocultarTarjetas();
    document.getElementById("cargando").style.display = "block";

    try {
      const res = await fetch(`${WEBAPP_URL}?id=${encodeURIComponent(id_familia)}`);
      const data = await res.json();
      document.getElementById("cargando").style.display = "none";
      mostrarResultado(data);
    } catch (e) {
      document.getElementById("cargando").style.display = "none";
      mostrarResultado({ status: "error" });
    }
  }

  function mostrarResultado(data) {
    ocultarTarjetas();

    if (data.status === "ok") {
      document.getElementById("nombre-ok").textContent = "Familia " + data.apellidos;
      document.getElementById("colegio-ok").textContent = data.colegio;
      document.getElementById("tarjeta-ok").style.display = "block";

    } else if (data.status === "ya_registrada") {
      document.getElementById("nombre-ya").textContent = "Familia " + data.apellidos;
      document.getElementById("colegio-ya").textContent = data.colegio;
      document.getElementById("tarjeta-ya").style.display = "block";

    } else {
      document.getElementById("tarjeta-error").style.display = "block";
    }
  }

  function ocultarTarjetas() {
    document.querySelectorAll(".tarjeta").forEach(t => t.style.display = "none");
  }

  async function reiniciar() {
    ocultarTarjetas();
    procesando = false;
    if (scanner) {
      try { await scanner.resume(); } catch(e) {}
    }
  }

  // Iniciar al cargar
  window.onload = iniciarScanner;
</script>
</body>
</html>
